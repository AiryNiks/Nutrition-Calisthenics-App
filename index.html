<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#FAF9F6" media="(prefers-color-scheme: light)" />
    <meta name="theme-color" content="#0F172A" media="(prefers-color-scheme: dark)" />
    <title>Mumbai Nutrition &amp; Calisthenics Tracker</title>
    <script>
      // Pre-hydration theme sync: prevents light-mode flash before React mounts.
      (function () {
        try {
          var stored = localStorage.getItem('nc-theme');
          var theme = stored ? JSON.parse(stored) : 'system';
          var dark =
            theme === 'dark' ||
            (theme === 'system' &&
              window.matchMedia('(prefers-color-scheme: dark)').matches);
          if (dark) document.documentElement.classList.add('dark');
        } catch (e) {}
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
